server {
  listen 4173;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  # Không cache file descriptor — tránh giữ inode cũ sau deploy mới
  open_file_cache off;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;
  # Không serve file .gz tiền-nén (tránh dùng file gz cũ stale)
  gzip_static off;

  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
    try_files /index.html =404;
  }

  location /assets/ {
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    etag on;
    if_modified_since exact;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache, must-revalidate, max-age=0" always;
    try_files $uri $uri/ /index.html;
  }
}