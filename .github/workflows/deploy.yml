name: Build & Deploy via Docker Compose

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t vite-app:latest .

      - name: Save image
        run: docker save vite-app:latest -o vite-app.tar
        
      - name: Fix permission
        run: chmod 644 vite-app.tar

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "vite-app.tar"
          target: "/home/dev-ops/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/dev-ops

            docker load -i vite-app.tar

            docker compose down
            docker compose up -d --force-recreate
